version: "3.9"

services:
  # 🔵 Node Backend
  node:
    image: node:24
    container_name: node_app
    working_dir: /app
    volumes:
      - ./backend-node:/app
    ports:
      - "5001:5001"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - postgres
      - mongo
      - redis

  # 🟢 React Frontend
  react:
    image: node:24
    container_name: react_app
    working_dir: /app
    volumes:
      - ./frontend-react:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm start"

  # 🟣 PHP App
  php:
    image: php:8.2-apache
    container_name: php_app
    volumes:
      - ./php-app:/var/www/html
    ports:
      - "8081:80"

  # 🐘 PostgreSQL
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 🍃 MongoDB
  mongo:
    image: mongo:6
    container_name: mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  # 🔴 Redis
  redis:
    image: redis:7
    container_name: redis_cache
    ports:
      - "6379:6379"

  # 🌐 Nginx (Reverse Proxy)
  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - node
      - react
      - php

volumes:
  pgdata:
  mongodata: